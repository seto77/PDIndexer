# 260406Cl PDIndexer 用に CSManager の release.yml を改修
# 260601Ch portable ZIP も同じリリースに添付するため、MSI を主配布のまま workflow 名を更新
# 260624Cl vdproj→WiX 移行 Phase B (計画書 .project-guidance/PDIndexer_WiX移行計画.md §5 Phase B):
#   旧 vdproj ビルド経路 (Find devenv.com / Build managed→bin\Release / vdproj regex 書換 /
#   DisableOutOfProcBuild レジストリハック / CI 専用 sln 動的生成 / devenv.com で MSI ビルド) を全廃し、
#   「framework-dependent publish → 専用 staging → dotnet build WiX wixproj」に置換した。
#   PDIndexer は Crystallography.Native を同梱しないため native(vcxproj)/devenv ステップは不要 (D-PDI-1)。
#   x64 のみ。arm64 MSI/ZIP の同時公開 (5-job inline) は Phase C で別途。
#   アセット名: 主名称 PDIndexer-setup.msi (WiX OutputName) + 旧名互換コピー PDIndexerSetup.msi (同一バイト、
#   旧クライアント自動更新 {software}Setup.msi 固定参照を数年間維持) + portable PDIndexer-v.<ver>.zip。
name: Build And Release Installer And Portable ZIP

on:
  push:
    branches: [master]
    paths:
      - "PDIndexer/Version.cs"
  workflow_dispatch:
    inputs:
      force:
        description: "既存リリースを削除してリビルドする"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    # 260624Cl PDI は native vcxproj が無く devenv 不要 (D-PDI-1)。当面 release イメージは維持。
    #   windows-2025 への簡素化は計画書 §8 リスク#5 で別途検証 (WiX は SDK スタイルで dotnet restore が取得)。
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive # 260624Cl shared libs are git submodules

      - name: Parse version and check if release needed
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content "PDIndexer\Version.cs" -Raw
          if ($content -notmatch 'ver(\d+\.\d+)\(') {
            throw "Could not parse version from Version.cs History."
          }
          $ver = $Matches[1]
          $tag = "v.$ver"

          # 同じバージョンのリリースが既にあればスキップ (force 時は既存を削除して続行)
          gh release view $tag 2>&1 | Out-Null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $global:LASTEXITCODE = 0
          if ($releaseExists) {
            if ("${{ inputs.force }}" -eq "true") {
              Write-Host "Force mode: deleting existing release $tag..."
              gh release delete $tag --yes
              git push origin :refs/tags/$tag 2>&1 | Out-Null
              $global:LASTEXITCODE = 0
            } else {
              Write-Host "Release $tag already exists. Skipping."
              "needed=false" >> $env:GITHUB_OUTPUT
              return
            }
          }

          # History の先頭行をリリースノートに使う (notes は最終ステップで組む)
          $historyLine = ([regex]::Match($content, 'ver[^\r\n"]+').Value).Trim()

          # AssemblyVersion / FileVersion 用のタイムスタンプ (yyyy.M.d.HHmm UTC)
          # 260624Cl Phase B は x64 のみ。arm64 との same-version cross-grade (FileVersion 完全一致) は Phase C で
          #   commit 時刻アンカーに切替えるが、x64 単独の今は UtcNow で十分。
          $now = [System.DateTime]::UtcNow
          $assemblyVer = "$($now.Year).$($now.Month).$($now.Day).$($now.ToString('HHmm'))"

          Write-Host "New version detected: $ver (tag: $tag, assembly: $assemblyVer)"
          "needed=true"            >> $env:GITHUB_OUTPUT
          "version=$ver"           >> $env:GITHUB_OUTPUT
          "tag=$tag"               >> $env:GITHUB_OUTPUT
          "product_version=0.$ver" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVer" >> $env:GITHUB_OUTPUT
          "history_line=$historyLine" >> $env:GITHUB_OUTPUT

      # ---- 以降、新バージョンが検出されたときのみ実行 ----

      - name: Setup .NET 10
        if: steps.version.outputs.needed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore managed dependencies
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: dotnet restore PDIndexer\PDIndexer.csproj

      # 260624Cl vdproj→WiX 移行 (Phase B) で以下を廃止 (本文は git 履歴 1bfef5a 以前を参照):
      #   - Find devenv.com → PDI は native(vcxproj) ビルドが無いため不要 (D-PDI-1)
      #   - Build managed application (dotnet build → bin\Release を vdproj が SourcePath 参照) → 下の Stage に置換
      #   - Update installer version in vdproj (regex で ProductVersion/ProductCode/PackageCode 書換)
      #     → WiX では -p:ProductVersion 注入 + ProductCode 自動生成で代替 (UpgradeCode は Package.wxs に固定)
      #   - Disable out-of-proc setup project build (HKCU レジストリハック) → 不要
      #   - Create installer-only solution (PDIndexerSetup.CI.sln 動的生成) → 不要
      #   - Build installer with Visual Studio (devenv.com) → dotnet build (WixToolset.Sdk) に置換
      #   vdproj 一式 (PDIndexerSetup\) は WiX 版リリース 1 回成功後に削除予定 (計画書 §6 Phase B-3)。
      - name: Stage MSI payload (framework-dependent publish)
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: |
          $s = "artifacts\staging-msi-x64"
          dotnet publish PDIndexer\PDIndexer.csproj -c Release -p:Platform=x64 --self-contained false -o $s --no-restore `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          if ($LASTEXITCODE -ne 0) { throw "x64 publish failed." }
          # 260624Cl glfw3.dll を除外 (D-PDI-2): PDI は GLFW/GLControl を生成せず実行時未使用。OpenTK が透過供給する死荷物。
          Get-ChildItem $s -Filter "glfw3*.dll" | Remove-Item -Force
          # LICENSE.rtf / REQUIREMENT.rtf を同梱 (260625Cl vdproj 削除に伴い PDIndexerSetup.Wix\ へ移動済み)
          Copy-Item PDIndexerSetup.Wix\LICENSE.rtf, PDIndexerSetup.Wix\REQUIREMENT.rtf $s
          # 参照プロジェクトの分離 pdb は同梱しない (portable ZIP と同方針)
          Get-ChildItem $s -Filter *.pdb | Remove-Item
          # 出荷前検査 (計画書 §3 D3 / D-PDI-2)
          if (Test-Path "$s\README-PORTABLE.txt") { throw "README-PORTABLE.txt leaked (portable marker must not be in MSI)" }
          if (Test-Path "$s\coreclr.dll") { throw "self-contained runtime leaked into framework-dependent staging" }
          if (Test-Path "$s\glfw3.dll") { throw "glfw3.dll leaked (must be excluded per D-PDI-2)" }
          if (-not (Test-Path "$s\PDIndexer.exe")) { throw "PDIndexer.exe missing from staging" }
          if (-not (Test-Path "$s\libxrl-11.dll")) { throw "libxrl-11.dll (xraylib native) missing from staging" }
          # 3-D packaging 検査: 全カルチャのサテライト DLL が staging に揃っているか (MSI は staging を <Files **> で丸ごと収集
          #   するため、ここで欠ければ MSI からも無言で欠落する)。新言語を増やしたらこの一覧も更新 (Crystallography.SupportedCultures と同期)。
          $expectedCultures = @('ja','de','fr','es','pt','it','ru','zh-Hans','zh-Hant','ko')
          $missingSat = $expectedCultures | Where-Object { -not (Get-ChildItem "$s\$_" -Filter *.resources.dll -ErrorAction SilentlyContinue) }
          if ($missingSat) { throw "satellite assemblies missing for culture(s): $($missingSat -join ', ')" }
          Write-Host "MSI staging OK: $((Get-ChildItem $s -Recurse -File).Count) files"

      - name: Build installer with WiX
        id: build_installer
        if: steps.version.outputs.needed == 'true'
        timeout-minutes: 10
        shell: pwsh
        run: |
          dotnet build PDIndexerSetup.Wix\PDIndexerSetup.wixproj -c Release -p:InstallerPlatform=x64 `
            -p:ProductVersion=${{ steps.version.outputs.product_version }} `
            -p:StagingDir="$PWD\artifacts\staging-msi-x64"
          if ($LASTEXITCODE -ne 0) { throw "WiX build failed (exit $LASTEXITCODE)." }

          # 260624Cl 主名称は PDIndexer-setup.msi (wixproj OutputName)。旧クライアントの自動更新は ProgramUpdates 既定の
          #   {software}Setup.msi = PDIndexerSetup.msi を固定参照するため、同一バイトのコピーを旧名でも添付して互換維持する
          #   (case-insensitive DL のため過去の小文字公開資産 PDindexerSetup.msi とも整合。メモリ pdindexer-name-capitalization)。
          $msi = Get-Item "PDIndexerSetup.Wix\bin\Release\PDIndexer-setup.msi" -ErrorAction SilentlyContinue
          if (-not $msi) { throw "PDIndexer-setup.msi was not found." }
          Write-Host "MSI built: $($msi.FullName) ($($msi.Length) bytes)"
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT
          $legacy = Join-Path (Split-Path $msi.FullName) "PDIndexerSetup.msi"
          Copy-Item $msi.FullName $legacy -Force
          "legacy_msi_path=$legacy" >> $env:GITHUB_OUTPUT

      - name: Publish portable ZIP
        if: steps.version.outputs.needed == 'true'
        id: portable
        shell: pwsh
        run: |
          # 260601Ch 管理された Windows PC 向けの代替配布。MSI が第一候補、ZIP は管理者権限や .NET Runtime 導入が難しい環境用。
          # 260602Cl このステップは installer (MSI) ビルドより後に置く。self-contained publish が obj\x64\Release を symbol 無しで
          #          再生成し PDIndexer.pdb を消すため、旧 vdproj では MSI ビルドより前に走らせると Debug Symbols 出力グループが pdb を
          #          見つけられず失敗した。260624Cl WiX 移行でこの順序制約は解消済み (MSI は専用 staging から作り bin\Release を参照しない)。
          #          位置は当面維持 (変更を最小にするため)。
          $publishDir = Join-Path $env:RUNNER_TEMP "PDIndexer-portable\PDIndexer"
          # 260624Cl 命名簡素化 (計画書 D-PDI-4、旧: PDIndexer-v.X-win-x64-portable.zip)。x64 が無印、arm64 のみ接尾辞 (_arm64) の対称形。
          #          自動更新は MSI 固定 URL のみで ZIP 名に依存しない。
          $zipPath = Join-Path (Get-Location) "PDIndexer-v.${{ steps.version.outputs.version }}.zip"

          if (Test-Path $publishDir) { Remove-Item -LiteralPath $publishDir -Recurse -Force }
          if (Test-Path $zipPath) { Remove-Item -LiteralPath $zipPath -Force }

          dotnet publish PDIndexer\PDIndexer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o $publishDir

          # 260624Cl glfw3.dll は portable ZIP からも除外 (D-PDI-2、MSI と同方針)
          Get-ChildItem $publishDir -Filter "glfw3*.dll" | Remove-Item -Force

          Copy-Item "LICENSE.md" $publishDir -Force
          Copy-Item "README-PORTABLE.txt" $publishDir -Force # portable 判定マーカー (MSI には入れない)
          Compress-Archive -Path (Join-Path (Split-Path $publishDir -Parent) "PDIndexer") -DestinationPath $zipPath -Force

          Write-Host "Portable ZIP built: $zipPath"
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      # 260624Cl 「Generate release checksums」(SHA256SUMS.txt) ステップを廃止 (計画書 §0 最終形は 3 資産)。
      #   ReciPro 同方針: 同一チャネルに置く checksum は改竄対策にならず、真正性保証は SignPath 署名 (Phase D) で行う。

      - name: Upload workflow artifacts
        if: steps.version.outputs.needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PDIndexer-release-v.${{ steps.version.outputs.version }}
          path: |
            ${{ steps.build_installer.outputs.msi_path }}
            ${{ steps.build_installer.outputs.legacy_msi_path }}
            ${{ steps.portable.outputs.zip_path }}

      - name: Create tag and GitHub Release
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HISTORY_LINE: ${{ steps.version.outputs.history_line }}
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $tag = "${{ steps.version.outputs.tag }}"
          $historyLine = $env:HISTORY_LINE

          # 260624Cl リリースノート (Download 表)。アセット名は計画書 D-PDI-4。
          $notes = @(
            $historyLine
            ""
            "| Download | Description |"
            "|---|---|"
            "| **[PDIndexer-setup.msi](https://github.com/seto77/PDIndexer/releases/download/v.$ver/PDIndexer-setup.msi)** | **Recommended.** Installer for ordinary (x64) Windows PCs. |"
            "| [PDIndexer-v.$ver.zip](https://github.com/seto77/PDIndexer/releases/download/v.$ver/PDIndexer-v.$ver.zip) | Portable (x64): no installation, self-contained. Suitable for PCs where you have no administrator rights. |"
            "| PDIndexerSetup.msi | Identical to PDIndexer-setup.msi (legacy name for auto-update from older versions). |"
          )
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.txt"
          $notes | Set-Content -Path $notesPath -Encoding UTF8

          $assets = @(
            "${{ steps.build_installer.outputs.msi_path }}"
            "${{ steps.build_installer.outputs.legacy_msi_path }}"
            "${{ steps.portable.outputs.zip_path }}"
          )
          foreach ($a in $assets) { if (-not (Test-Path $a)) { throw "Release asset missing: $a" } }

          # 260624Cl タグとリリースを gh release create で原子的に作成 (--target で対象コミットを固定、計画書 §9 不可侵#5)。
          #   旧実装は git tag -a + git push の2段階で、push 成功後に release 作成が失敗するとタグだけ remote に残った。
          #   gh release create は tag 未存在時に --target のコミットへ lightweight tag を作成し release と一括で作るため
          #   orphan tag が発生せず、失敗時も同一バージョンで再試行できる (ReciPro 実績)。
          gh release create $tag $assets `
            --target $env:GITHUB_SHA `
            --title "PDIndexer $tag" `
            --notes-file $notesPath
          if ($LASTEXITCODE -ne 0) { throw "gh release create failed (exit $LASTEXITCODE)." }
          Write-Host "Released $tag with $($assets.Count) assets."
