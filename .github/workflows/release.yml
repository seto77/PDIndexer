# 260406Cl PDIndexer 用に CSManager の release.yml を改修
# 260601Ch portable ZIP も同じリリースに添付するため、MSI を主配布のまま workflow 名を更新
name: Build And Release Installer And Portable ZIP

on:
  push:
    branches: [master]
    paths:
      - "PDIndexer/Version.cs"
  workflow_dispatch:
    inputs:
      force:
        description: "既存リリースを削除してリビルドする"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-2025-vs2026
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive # 260624Cl shared libs are git submodules

      - name: Parse version and check if release needed
        id: version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $content = Get-Content "PDIndexer\Version.cs" -Raw
          if ($content -notmatch 'ver(\d+\.\d+)\(') {
            throw "Could not parse version from Version.cs History."
          }
          $ver = $Matches[1]
          $tag = "v.$ver"

          # 同じバージョンのリリースが既にあればスキップ (force 時は既存を削除して続行)
          gh release view $tag 2>&1 | Out-Null
          $releaseExists = ($LASTEXITCODE -eq 0)
          $global:LASTEXITCODE = 0
          if ($releaseExists) {
            if ("${{ inputs.force }}" -eq "true") {
              Write-Host "Force mode: deleting existing release $tag..."
              gh release delete $tag --yes
              git push origin :refs/tags/$tag 2>&1 | Out-Null
              $global:LASTEXITCODE = 0
            } else {
              Write-Host "Release $tag already exists. Skipping."
              "needed=false" >> $env:GITHUB_OUTPUT
              return
            }
          }

          # History の先頭行をリリースノートに使う
          $historyLine = ([regex]::Match($content, 'ver[^\r\n"]+').Value).Trim()
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.txt"
          # $historyLine | Set-Content -Path $notesPath -Encoding UTF8 # 260601Ch 旧: 変更履歴 1 行のみ
          @( # 260601Ch MSI を第一候補、portable ZIP を管理PC向け代替として release notes に明記
            $historyLine
            ""
            "Assets:"
            "- PDIndexerSetup.msi: recommended installer."
            "- PDIndexer-v.$ver-win-x64-portable.zip: no-install, self-contained alternative for managed Windows PCs."
            "- SHA256SUMS.txt: SHA256 hashes for release files."
          ) | Set-Content -Path $notesPath -Encoding UTF8

          # AssemblyVersion / FileVersion 用のタイムスタンプ (yyyy.M.d.HHmm UTC)
          $now = [System.DateTime]::UtcNow
          $assemblyVer = "$($now.Year).$($now.Month).$($now.Day).$($now.ToString('HHmm'))"

          Write-Host "New version detected: $ver (tag: $tag, assembly: $assemblyVer)"
          "needed=true"           >> $env:GITHUB_OUTPUT
          "version=$ver"          >> $env:GITHUB_OUTPUT
          "tag=$tag"              >> $env:GITHUB_OUTPUT
          "product_version=0.$ver" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "assembly_version=$assemblyVer" >> $env:GITHUB_OUTPUT

      # ---- 以降、新バージョンが検出されたときのみ実行 ----

      - name: Setup .NET 10
        if: steps.version.outputs.needed == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore managed dependencies
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: dotnet restore PDIndexer\PDIndexer.csproj

      - name: Find devenv.com
        if: steps.version.outputs.needed == 'true'
        id: devenv
        shell: pwsh
        run: |
          $devenvExe = (& "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -property productPath).Trim()
          if (-not $devenvExe) { throw "Visual Studio was not found." }
          $cli = [System.IO.Path]::ChangeExtension($devenvExe, ".com")
          if (-not (Test-Path $cli)) { throw "devenv.com was not found." }
          Write-Host "devenv.com: $cli"
          "cli=$cli" >> $env:GITHUB_OUTPUT

      - name: Build managed application
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: dotnet build PDIndexer\PDIndexer.csproj -c Release -p:Platform=x64 -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} -p:FileVersion=${{ steps.version.outputs.assembly_version }} --no-restore

      - name: Update installer version in vdproj
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: |
          $vdproj = Get-Content "PDIndexerSetup\PDIndexerSetup.vdproj" -Raw

          # ProductVersion を更新 (例: "8:0.4.459")
          $vdproj = $vdproj -replace '"ProductVersion" = "8:[^"]*"', '"ProductVersion" = "8:${{ steps.version.outputs.product_version }}"'

          # ProductCode と PackageCode を新しい GUID に更新 (UpgradeCode は変えない)
          $newProductCode = ([guid]::NewGuid()).ToString("B").ToUpper()
          $newPackageCode = ([guid]::NewGuid()).ToString("B").ToUpper()
          $vdproj = $vdproj -replace '"ProductCode" = "8:\{[^}]+\}"', "`"ProductCode`" = `"8:$newProductCode`""
          $vdproj = $vdproj -replace '"PackageCode" = "8:\{[^}]+\}"', "`"PackageCode`" = `"8:$newPackageCode`""

          Set-Content "PDIndexerSetup\PDIndexerSetup.vdproj" $vdproj -NoNewline
          Write-Host "ProductVersion = 0.${{ steps.version.outputs.version }}"
          Write-Host "ProductCode    = $newProductCode"
          Write-Host "PackageCode    = $newPackageCode"

      - name: Disable out-of-proc setup project build
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        run: |
          $visualStudioRoot = "HKCU:\Software\Microsoft\VisualStudio"
          Get-ChildItem $visualStudioRoot -ErrorAction SilentlyContinue |
            Where-Object { $_.PSChildName -like '17.0*_Config' -or $_.PSChildName -like '18.0*_Config' } |
            ForEach-Object {
              $key = Join-Path $_.PSPath "MSBuild"
              if (-not (Test-Path $key)) { New-Item -Path $key -Force | Out-Null }
              New-ItemProperty -Path $key -Name DisableOutOfProcBuild -PropertyType DWord -Value 1 -Force | Out-Null
              Write-Host "Set DisableOutOfProcBuild=1 at $key"
            }

      - name: Create installer-only solution
        if: steps.version.outputs.needed == 'true'
        id: pack_solution
        shell: pwsh
        run: |
          $solutionPath = Join-Path (Get-Location) "PDIndexerSetup.CI.sln"
          @'
          Microsoft Visual Studio Solution File, Format Version 12.00
          # Visual Studio Version 18
          VisualStudioVersion = 18.1.11304.174
          MinimumVisualStudioVersion = 10.0.40219.1
          Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "PDIndexer", "PDIndexer\PDIndexer.csproj", "{D29BD053-810E-4797-9985-00CD41BC60FD}"
          EndProject
          Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "Crystallography", "Crystallography\Crystallography.csproj", "{86A34A41-32E0-4033-9C4E-4BFA8C621E90}"
          EndProject
          Project("{9A19103F-16F7-4668-BE54-9A1E7A4F7556}") = "Crystallography.Controls", "Crystallography.Controls\Crystallography.Controls.csproj", "{B6074BFC-0860-42DE-9525-49D97029F595}"
          EndProject
          Project("{54435603-DBB4-11D2-8724-00A0C9A8B90C}") = "PDIndexerSetup", "PDIndexerSetup\PDIndexerSetup.vdproj", "{80EF52B7-7757-4980-A47A-0772A37AB289}"
          EndProject
          Global
          	GlobalSection(SolutionConfigurationPlatforms) = preSolution
          		Release|x64 = Release|x64
          	EndGlobalSection
          	GlobalSection(ProjectConfigurationPlatforms) = postSolution
          		{D29BD053-810E-4797-9985-00CD41BC60FD}.Release|x64.ActiveCfg = Release|x64
          		{86A34A41-32E0-4033-9C4E-4BFA8C621E90}.Release|x64.ActiveCfg = Release|x64
          		{B6074BFC-0860-42DE-9525-49D97029F595}.Release|x64.ActiveCfg = Release|x64
          		{80EF52B7-7757-4980-A47A-0772A37AB289}.Release|x64.ActiveCfg = Release
          		{80EF52B7-7757-4980-A47A-0772A37AB289}.Release|x64.Build.0 = Release
          	EndGlobalSection
          EndGlobal
          '@ | Set-Content -Path $solutionPath -Encoding ASCII
          "path=$solutionPath" >> $env:GITHUB_OUTPUT

      - name: Build installer with Visual Studio
        id: build_installer
        if: steps.version.outputs.needed == 'true'
        timeout-minutes: 10
        shell: pwsh
        run: |
          $log = Join-Path $env:RUNNER_TEMP "devenv-setup.log"
          & "${{ steps.devenv.outputs.cli }}" "${{ steps.pack_solution.outputs.path }}" /Build "Release|x64" /Project "PDIndexerSetup" /Out $log
          $exitCode = $LASTEXITCODE
          if (Test-Path $log) { Get-Content $log }
          if ($exitCode -ne 0) { throw "PDIndexerSetup build failed (exit $exitCode)." }

          # MSI の存在確認
          $msi = Get-ChildItem -Path "PDIndexerSetup" -Filter "PDIndexerSetup.msi" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $msi) { throw "PDIndexerSetup.msi was not found." }
          Write-Host "MSI built: $($msi.FullName)"
          "msi_path=$($msi.FullName)" >> $env:GITHUB_OUTPUT

      - name: Publish portable ZIP
        if: steps.version.outputs.needed == 'true'
        id: portable
        shell: pwsh
        run: |
          # 260601Ch 管理された Windows PC 向けの代替配布。MSI が第一候補、ZIP は管理者権限や .NET Runtime 導入が難しい環境用。
          # 260602Cl このステップは installer (MSI) ビルドより後に置く。self-contained publish が obj\x64\Release を symbol 無しで再生成し PDIndexer.pdb を消すため、MSI ビルドより前に走らせると vdproj の Debug Symbols 出力グループが pdb を見つけられず MSI ビルドが失敗する。
          $publishDir = Join-Path $env:RUNNER_TEMP "PDIndexer-portable\PDIndexer"
          $zipPath = Join-Path (Get-Location) "PDIndexer-v.${{ steps.version.outputs.version }}-win-x64-portable.zip"

          if (Test-Path $publishDir) { Remove-Item -LiteralPath $publishDir -Recurse -Force }
          if (Test-Path $zipPath) { Remove-Item -LiteralPath $zipPath -Force }

          dotnet publish PDIndexer\PDIndexer.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:Platform=x64 `
            -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }} `
            -p:FileVersion=${{ steps.version.outputs.assembly_version }} `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -o $publishDir

          Copy-Item "LICENSE.md" $publishDir -Force
          Copy-Item "README-PORTABLE.txt" $publishDir -Force
          Compress-Archive -Path (Join-Path (Split-Path $publishDir -Parent) "PDIndexer") -DestinationPath $zipPath -Force

          Write-Host "Portable ZIP built: $zipPath"
          "zip_path=$zipPath" >> $env:GITHUB_OUTPUT

      - name: Generate release checksums
        if: steps.version.outputs.needed == 'true'
        id: checksums
        shell: pwsh
        run: |
          # 260601Ch MSI と portable ZIP の検証用 SHA256 を同梱する。
          $checksums = Join-Path (Get-Location) "SHA256SUMS.txt"
          $files = @(
            "${{ steps.build_installer.outputs.msi_path }}",
            "${{ steps.portable.outputs.zip_path }}"
          )
          $lines = foreach ($file in $files) {
            $hash = Get-FileHash $file -Algorithm SHA256
            "$($hash.Hash)  $(Split-Path $file -Leaf)"
          }
          $lines | Set-Content -Path $checksums -Encoding ASCII
          Get-Content $checksums
          "checksums_path=$checksums" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifacts
        if: steps.version.outputs.needed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: PDIndexer-release-v.${{ steps.version.outputs.version }}
          path: |
            ${{ steps.build_installer.outputs.msi_path }}
            ${{ steps.portable.outputs.zip_path }}
            ${{ steps.checksums.outputs.checksums_path }}

      - name: Create tag and GitHub Release
        if: steps.version.outputs.needed == 'true'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"

          # タグを作成してプッシュ
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a $tag -m "PDIndexer ${{ steps.version.outputs.version }}"
          git push origin $tag

          # 260601Ch リリースを作成して、第一候補の MSI と第二候補の portable ZIP を添付
          gh release create $tag `
            "${{ steps.build_installer.outputs.msi_path }}" `
            "${{ steps.portable.outputs.zip_path }}" `
            "${{ steps.checksums.outputs.checksums_path }}" `
            --title "PDIndexer $tag" `
            --notes-file "${{ steps.version.outputs.notes_path }}"
